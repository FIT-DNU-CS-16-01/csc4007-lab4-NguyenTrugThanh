name: lab4-ci

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local CSV smoke test
        run: |
          python run_lab4.py \
            --dataset local_csv \
            --data_path data/raw/sample_imdb_tiny.csv \
            --model_type lstm \
            --epochs 2 \
            --batch_size 4 \
            --max_len 64 \
            --vocab_size 1000 \
            --embed_dim 32 \
            --hidden_dim 32 \
            --wandb_mode disabled

      - name: Check required artifacts
        run: |
          python - <<'PY'
          from pathlib import Path
          required = [
              'outputs/logs/sequence_audit.md',
              'outputs/logs/run_summary.json',
              'outputs/metrics/epoch_history.csv',
              'outputs/metrics/metrics_summary.json',
              'outputs/metrics/metrics_summary.md',
              'outputs/figures/loss_curve.png',
              'outputs/figures/metric_curve.png',
              'outputs/figures/confusion_matrix.png',
              'outputs/models/best_model.pt',
              'outputs/predictions/test_predictions.csv',
              'outputs/error_analysis/error_analysis.csv',
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing artifacts: ' + ', '.join(missing))
          print('All required artifacts exist.')
          PY
