name: lab4-imdb-smoke

on:
  workflow_dispatch:

jobs:
  imdb-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run small IMDB smoke test
        run: |
          python run_lab4.py \
            --dataset imdb \
            --max_rows 200 \
            --model_type gru \
            --epochs 1 \
            --batch_size 16 \
            --max_len 96 \
            --vocab_size 3000 \
            --embed_dim 64 \
            --hidden_dim 64 \
            --wandb_mode disabled
